name: "Test Suite"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --verbose --features "pyo3 half ndarray image candle cudarc"
      - name: Run tests
        run: cargo test --verbose --features "pyo3 half ndarray image candle"
